# Render Blueprint — Scarred Truth site (single Node web service).
# One service serves the quiz/stories/result pages, the 30-day share links, the AI
# "note from Zane", and the streaming Zane chat. rootDir points Render at zane-ai;
# the whole repo is checked out, so server.js can serve ../docs as the site root.
#
# Secrets are marked `sync: false` -> Render prompts for them in the dashboard and
# they are NEVER committed. Set them once at deploy time:
#   OPENROUTER_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_KEY (and OPENROUTER_NOTE_MODEL if used).
services:
  - type: web
    name: scarred-truth
    runtime: node
    plan: starter         # always-on ($7/mo). Matches the live service — do NOT set back to "free" (free sleeps after 15 min idle and causes intermittent broken images on first load).
    rootDir: zane-ai
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORE_BACKEND
        value: supabase
      - key: FREE_CHAT_CAP
        value: "50"
      - key: ALLOWED_ORIGINS
        value: https://scarredtruth.com,https://www.scarredtruth.com
      - key: OPENROUTER_CHAT_MODEL
        value: deepseek/deepseek-v3.2
      - key: OPENROUTER_REFERER
        value: https://scarredtruth.com
      - key: SITE_ORIGIN
        value: https://scarredtruth.com
      # MailerLite: quiz completers are upserted into a group; a "joins group" automation
      # emails her the result. Both must be set or the push is skipped (site still works).
      - key: MAILERLITE_GROUP_ID
        value: "192864332519834709"   # "Quiz completions"
      - key: MAILERLITE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_NOTE_MODEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
