/* Only reads the fields that are ON SCREEN. The three questions each live on their own card
   now, so a missing box means "not this card" — never "she cleared it". Reading a missing id
   as '' would wipe what she wrote the moment she tapped Next. */
function readPersonal(){
  var g=function(id){var e=document.getElementById(id);return e?e.value:null;};
  var set=function(k,val){ if(val!==null) person[k]=val; };
  set('dream',g('dream')); set('become',g('become')); set('technique',g('technique'));
  set('name',g('pname')); set('email',g('pemail'));
}

/* Checked when she leaves the field, never while she is still typing (nobody should be told
   they're wrong mid-word). Empty is fine — it's optional. But a broken address means she waits
   for a letter that can never arrive, so that one we do stop. */
function emailLooksReal(s){ return /^[^\s@]+@[^\s@]+\.[a-z]{2,}$/i.test((s||'').trim()); }
function checkEmail(){
  var el=document.getElementById('pemail'), slot=document.getElementById('emailerr');
  if(!el||!slot) return true;
  var val=el.value.trim();
  if(!val || emailLooksReal(val)){ el.classList.remove('bad'); el.removeAttribute('aria-invalid'); slot.innerHTML=''; return true; }
  el.classList.add('bad'); el.setAttribute('aria-invalid','true');
  slot.innerHTML='<p class="fielderr">'+ICON_WARN_SM+'<span>That address looks unfinished — it should look like <em>name@email.com</em>. Or leave it empty and just read your result here.</span></p>';
  return false;
}

var SAVING=false;          // she can tap twice; that used to make two of her
var PAYLOAD=null;          // kept so [Try again] can re-send exactly what she wrote
var FRESH_SUBMIT=false;    // tells afterResult() to leave the note to submitResult()

function savePersonal(){

    secondary:(res.primary!=='steady'&&res.secondary)?res.secondary:null,

    primaryName:p?p.name:'', coreFear:p?p.coreFear:'',

    person:{name:person.name,dream:person.dream,become:person.become,technique:person.technique,email:person.email}};

  setPending(PAYLOAD);   // queued the moment she taps — survives a dead tab, a dead phone, a dead server
  go('result');          // her result shows at once — she never waits on the network to read it
  submitResult();

/* ===== a failed save is OUR problem, not hers =====
   She is never shown an error and never asked to press anything. The save just keeps trying:
   backing off while she's on the page, retrying the instant her signal comes back, and — if the
   tab died mid-request — finishing itself the next time she opens the site. Her result reads
   normally the whole time; only the share link waits.

   Deliberately NOT using fetch(keepalive:true) to survive tab-close: keepalive caps the request
   body at 64KB, which would silently break exactly the long answers this is all here to protect.
   The pending queue below covers tab-close without that trap. */
var PENDING_KEY='st_pending_v1';
function setPending(p){ if(!DRAFT_ON) return; try{ localStorage.setItem(PENDING_KEY,JSON.stringify({payload:p,at:Date.now()})); }catch(_){} }
function clearPending(){ if(!DRAFT_ON) return; try{ localStorage.removeItem(PENDING_KEY); }catch(_){} }
function getPending(){
  if(!DRAFT_ON) return null;
  try{
    var d=JSON.parse(localStorage.getItem(PENDING_KEY)||'null');
    if(!d||!d.payload) return null;
    if(Date.now()-d.at > 7*24*3600*1000){ clearPending(); return null; }  // a week, then let it go
    return d.payload;
  }catch(_){ return null; }
}

var RETRY_TIMER=null;
function submitResult(attempt){
  attempt=attempt||1;
  SAVING=true;
  clearTimeout(RETRY_TIMER);

  api('/api/result',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(PAYLOAD)})
    .then(function(r){
      if(!r.ok) throw new Error('http '+r.status);   // a 500 used to be fed straight into .json()
      return r.json();
    })
    .then(function(j){
      if(!j||!j.id) throw new Error('no id');
      SAVING=false;
      RESULT_ID=j.id;
      clearPending(); clearDraft();                  // safe now — it's on the server
      try{ history.replaceState(null,'','/r/'+j.id); }catch(_){ }
      showShare(j.id);
      fetchNote();                                   // now, with her id, so the note is actually kept
    })
    .catch(function(err){
      console.error('[quiz] save attempt '+attempt+' failed:', err && err.message);
      var wait=Math.min(60000, 800*Math.pow(2, attempt-1));   // 0.8s, 1.6s, 3.2s … capped at a minute
      RETRY_TIMER=setTimeout(function(){ submitResult(attempt+1); }, wait);
    });
}

/* her signal came back — don't sit on a backoff timer */
window.addEventListener('online', function(){
  if(SAVING && PAYLOAD){ clearTimeout(RETRY_TIMER); submitResult(1); }
});

/* the tab died mid-save, or the server was down the whole time she was here.
   Finish it quietly on her next visit; she never knows it happened. */
function flushPending(){
  var p=getPending();
  if(!p) return;
  api('/api/result',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})
    .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.json(); })
    .then(function(j){ if(j&&j.id){ clearPending(); clearDraft(); console.log('[quiz] recovered an unsaved submission:', j.id); } })
    .catch(function(){ /* leave it queued — we'll try again next time she's here */ });
}

/* ===== ZANE NOTE (deterministic, offline, faith-aware, responds to her words) ===== */
function firstSentence(s){
  s=(s||'').trim(); if(!s) return '';
  var m=s.match(/^[^.!?\n]+[.!?]?/);
  var out=m?m[0].trim():s;
  if(out.length>180) out=out.slice(0,177).replace(/\s+\S*$/,'')+'…';
  return out;
}
function trimEcho(s){
  /* strip a trailing run of bare punctuation so we never echo raw "." or "…" */
  return (s||'').replace(/[\s.!?,;:…—-]+$/,'').trim();
}
function mentionsFaith(s){return /\b(god|jesus|christ|faith|pray(?:er|ing|ed)?|church|lord|bible|scripture|believer|blessed|grace)\b/i.test(s||'');}
/* The instant note she reads while the real one is still being written. It answers the three
   questions she just finished — the ending she named — not the old pain questions. */
function zaneNote(p){
  var nm=person.name?esc(trimEcho(person.name)):'';
  var dreamRaw=trimEcho(person.dream);
  var becomeRaw=trimEcho(firstSentence(person.become));
  var techRaw=trimEcho(firstSentence(person.technique));
  var dream=dreamRaw?esc(dreamRaw):'';
  var become=becomeRaw?esc(becomeRaw):'';
  var tech=techRaw?esc(techRaw):'';
  var faith=mentionsFaith(person.dream)||mentionsFaith(person.become)||mentionsFaith(person.technique);

  var body='';
  body+='<p>'+(nm?nm+', here':'Here')+'’s what I want you to know.</p>';
  if(dream){
    body+='<p class="yourwords">You told me where you want to be: “'+dream+'”</p>';
    body+='<p>I read that twice. That isn’t a fantasy. That’s a direction — and you just said it out loud, which most people never do.</p>';
  }
  body+='<p>'+esc(p.whatsTrue)+'</p>';
  if(become){
    body+='<p>And the woman you’d be proud of in the mirror — “'+become+'” — you don’t have to build her from scratch. She’s who you were before you started making yourself smaller.</p>';
  }
  if(tech){
    body+='<p>You already know what would help. You said it yourself: “'+tech+'.” That’s further than most people get.</p>';
  }
  if(faith){
    body+='<p>And you don’t have to do it on your own strength. You were already held before you ever found these words.</p>';
  }
  body+='<p>Here’s where I’d start'+(nm?', '+nm:'')+': '+esc(p.firstStep)+'</p>';

  return '<div class="notewrap reveal"><div class="note"><div class="nh">A note from Zane · for you'+(nm?', '+nm:'')+'</div>'+body+
    '<div class="sig-mark"><img src="site-assets/zane-signature.png" alt="Zane — signed"></div></div></div>';
}

/* ===== SCORE BARS — TOP 3 only, light =====
   The bar IS the percentage now. It used to be (her points ÷ the TOP profile's points) while the
   number beside it was (her points ÷ THAT profile's own maximum) — two different scales. So the
   bars contradicted their own labels: on a real result, 38% and 27% drew as identical lengths.
   One scale: bar width = the number shown. */
function renderScores(res){
  var ranked=rankedKeys(res.tally, answers);
  var top3=ranked.slice(0,3);
  var bars=top3.map(function(k,i){
    var w=pctOf(k,res.tally)/100;
    var fc=(k===res.primary&&res.primary!=='steady')?('var('+FAM[k].fc+')'):'var(--fam-rest)';
    if(i===1) fc='var(--fam-measure)'; if(i===2) fc='var(--dim)';
    if(k===res.primary&&res.primary!=='steady') fc='var('+FAM[k].fc+')';
    return '<div class="bar" style="--w:'+w.toFixed(2)+';--barfc:'+fc+'">'+
      '<div class="lab"><span>'+esc(LBL[k])+'</span><span>'+(res.tally[k]>0?pctOf(k,res.tally)+'%':'—')+'</span></div>'+
      '<div class="track"><div class="fill"></div></div></div>';
  }).join('');
  var cap=(res.primary==='steady')?'Barely a flicker on any of them — and that’s exactly the point.':'Your top three. The tallest is the one quietly running the show.';
  return '<div class="bars">'+bars+'</div><p class="dim scorecap">'+cap+'</p>';
}

/* ===== RESULT ===== */
function blk(label,body,mark){var m=mark?'<img class="bgmark" src="site-assets/marks/'+mark+'.webp" alt="" aria-hidden="true">':'';return '<div class="block reveal">'+m+'<span class="eyebrow">'+label+'</span>'+body+'</div>';}
function renderResult(){
  var res=currentRes(); var p=P[res.primary]||P.steady; var fam=FAM[res.primary];
  var isSteady=(res.primary==='steady');
  var ranked=rankedKeys(res.tally, answers);
  var secKey=(!isSteady)?(res.secondary||(ranked[1]&&res.tally[ranked[1]]>0&&ranked[1]!==res.primary?ranked[1]:null)):null;
  var terKey=(!isSteady)?((LOADED&&LOADED.tertiary)||(ranked[2]&&res.tally[ranked[2]]>0&&ranked[2]!==res.primary&&ranked[2]!==secKey?ranked[2]:null)):null;
  var famTitle=isSteady?'The dream':p.group;
  var lead=isSteady
    ? 'You’re not waiting to be okay anymore. You already are — you just don’t say it out loud.'
    : '“'+esc(p.coreFear)+'”';
  /* "40% — this is you" invited the obvious retort: "so I'm 60% NOT this?" The median result is
     ~40% and most land under 50%, so that reading was the common one. Same number, a claim it can
     actually carry. */
  var matchHtml=isSteady?'':'<div class="matchpct">'+pctOf(res.primary,res.tally)+'% <span>your strongest pattern</span></div>';
  var blendHtml=(secKey||terKey)?('<div class="blend reveal"><span class="eyebrow">Your blend — the top three</span>'+
    profileMixCard(res.primary,res.tally,'Strongest')+
    (secKey?profileMixCard(secKey,res.tally,'Also strong in you'):'')+
    (terKey?profileMixCard(terKey,res.tally,'A thread of this too'):'')+'</div>'):'';
  var moves=(p.wayBack.moves||[]).map(function(mv){return '<li>'+esc(mv)+'</li>';}).join('');
  var echo=getQuotes(res.primary,'recognition').slice(0,2);
  if(!echo.length) echo=getQuotes(res.primary,'dream').slice(0,2);
  var echoHtml=echo.map(function(q){return '<p class="eq">“'+esc(q.text)+'”'+cite(q)+'</p>';}).join('');
  var ds=C.dreamState; var scenes=(ds.concreteScenes||[]).slice(0,3).map(function(s){return '<li>'+esc(s)+'</li>';}).join('');

  return topbar()+'<div class="rwrap"><div class="wrap">'+
    /* portrait + bars + Zane note */
    '<div class="card result reveal" style="'+famVars(res.primary)+'">'+
      '<div class="rpix">'+illImg(res.primary)+'<span class="rfam">'+esc(famTitle)+'</span></div>'+
      '<div class="rbody">'+
        '<span class="eyebrow">Your result</span>'+
        '<h2>'+esc(p.name)+'</h2>'+
        '<p class="sub">'+esc(p.hookLine)+'</p>'+matchHtml+
        '<p class="lead-fear">'+lead+'</p>'+
        renderScores(res)+
      '</div>'+
    '</div>'+
    '</div>'+
    blendHtml+
    '<div id="sharebox-slot"></div>'+

    /* who you are */
    blk('Where it comes from','<p>'+esc(p.root)+'</p>','stone')+
    blk('What it’s costing you','<p>'+esc(p.cost)+'</p>','carry')+
    '<div class="strength-card card reveal"><div class="in"><img class="bgmark" src="site-assets/marks/heart.webp" alt="" aria-hidden="true"><span class="eyebrow">The strength hiding underneath</span><p>'+esc(p.strength)+'</p></div></div>'+

    '<div id="zane-note-slot">'+(hasWords()?zaneNote(p):'')+'</div>'+
    renderChatWidget()+

    seam()+

    /* the way out */
    blk('The way back','<p>'+esc(p.wayBack.shift)+'</p><ul class="checklist">'+moves+'</ul>','release')+
    blk('Who you become on the other side','<p>'+esc(p.rebuild)+'</p>'+(p.dreamPicture?'<p class="dreampull">'+esc(p.dreamPicture)+'</p>':''),'wing')+
    blk('Picture the day it lifts','<ul class="checklist">'+scenes+'</ul>')+

    seam()+

    /* THE JOURNEY — where you are now -> where this goes, joined by a signature arrow */
    '<div class="block reveal" style="padding-top:12px"><div class="journeyhead"><span class="eyebrow" style="color:var(--gold-deep)">The journey from here</span><h2 style="font-size:clamp(24px,3.4vw,34px)">Where you are now — and where it goes.</h2></div>'+
      '<div class="journey">'+
        '<figure>'+illImg(res.primary)+'<figcaption>Where you are now</figcaption></figure>'+
        '<div class="jarrow"><svg viewBox="0 0 52 30"><path d="M3 15 C19 9 33 21 49 15 M49 15 L42 10 M49 15 L42 21"/></svg><span>becomes</span></div>'+
        '<figure><img src="site-assets/illustrations/steady.webp" alt="A woman standing free, the weight set down, on her own throne"><figcaption>Where this goes</figcaption></figure>'+
      '</div>'+
    '</div>'+

    /* No hardcoded "A real woman who stood where you are" here — two of the eight stories are
       Zane's own, and this header announced a woman and then handed the page to a man.
       renderFeaturedStory() prints the honest label for whichever it is. */
    '<div class="block reveal">'+renderFeaturedStory(res.primary)+'</div>'+

    '<div class="echo reveal"><span class="eyebrow" style="color:var(--gold-deep);display:block;margin-bottom:14px">Women who’ve stood where you are</span>'+echoHtml+
      '<div class="resultband"><img src="site-assets/illustrations/group.webp" alt="Women, each carrying a different weight, together at dawn"><p class="rcap" style="margin-top:10px">You’re in good company.</p></div></div>'+

    '<div class="firststep reveal"><div class="card cta-card"><img class="bgmark" src="site-assets/marks/peak.webp" alt="" aria-hidden="true"><span class="eyebrow">Your first step — today</span><h3>Start this small</h3><p class="step">'+esc(p.firstStep)+'</p>'+
      '<p style="margin:18px auto 14px;max-width:46ch;font-size:16px;color:var(--ink-2)">And if you don’t want to do the rest alone: on the morning of August 8, 2026, a group of women start over together — one full month, one small thing a day, posted by me every morning.</p>'+
      '<a class="btn" href="/join-myself-again-cohort">See Myself Again — it begins 08.08.2026</a></div></div>'+
  '</div>'+

    /* UNIFIED FOOTER — result variant (they took the quiz → soft cross-sell to Zane) */
    '<footer class="bigfoot">'+
      '<div class="ffmedia"><img src="site-assets/illustrations/journey.webp" alt="A woman’s journey — bent under a heavy burden, then sitting tall and free on her own throne"></div>'+
      '<div class="ffinner reveal">'+
        '<span class="eyebrow">You don’t walk it alone</span>'+
        '<h2>The next part goes better with <em>company</em>.</h2>'+
        '<p class="fflead">On the morning of August 8th, a room of women starts over together — one small step a day, with Zane walking you through it.</p>'+
        '<a class="btn" href="/join-myself-again-cohort">Join Myself Again — $97</a>'+
        '<div class="rfoot"><button class="btn ghost" onclick="restart()">Take it again</button><button class="btn ghost" onclick="go(\'entry\')">Meet the other types</button></div>'+
        '<p class="brand">Scarred Truth · Zane</p>'+
        '<p class="fine">© Scarred Truth · You can set it down, and still be exactly who you are.</p>'+
        '<p class="fine">Scarred Truth is operated by Humble Echo LLC · <a href="mailto:zane@scarredtruth.com" style="color:inherit">zane@scarredtruth.com</a></p>'+
      '</div>'+
    '</footer>';
}
function restart(){answers=[];qi=0;oi=0;person={name:'',dream:'',become:'',technique:'',email:''};clearDraft();go('quiz');}

/* ===== she came back to a half-finished quiz =====
   Offered, never forced — she can always start clean. */
var RESUMABLE=null;
function renderResume(){
  if(!RESUMABLE) return '';
  var done=RESUMABLE.answers.length, total=C.quizScenes.length;
  return '<div class="wrap"><div class="resume">'+
    '<p>You started this before.</p>'+
    '<p class="sub">'+done+' of '+total+' answered. Everything you wrote is still here.</p>'+
    '<div class="row">'+
      '<button class="btn" onclick="resumeDraft()">Pick up where I left off</button>'+
      '<button class="btn ghost" onclick="dropDraft()">Start over</button>'+
    '</div>'+
  '</div></div>';
}
function resumeDraft(){
  if(!RESUMABLE) return;
  answers=RESUMABLE.answers.slice();
  qi=Math.min(RESUMABLE.qi||0, C.quizScenes.length-1);
  oi=Math.min(RESUMABLE.oi||0, OPENQ.length-1);
  person=Object.assign({name:'',dream:'',become:'',technique:'',email:''}, RESUMABLE.person||{});
  RESUMABLE=null;
  go(answers.length>=C.quizScenes.length ? 'open' : 'quiz');
}
function dropDraft(){ RESUMABLE=null; clearDraft(); paint(); }

/* ===== ROUTER ===== */
var stage='entry';
function paint(){
  var app=document.getElementById('app');
  if(stage==='entry') app.innerHTML=renderResume()+renderEntry();
  else if(stage==='quiz') app.innerHTML=renderQuiz();
  else if(stage==='open') app.innerHTML=renderOpen();
  else if(stage==='personal') app.innerHTML=renderPersonal();
  else app.innerHTML=renderResult();
  wireReveal();
  if(stage==='open'||stage==='personal'){ growAll(); }
  if(stage==='result') afterResult();
}
function go(s){stage=s; if(s==='quiz'&&qi>=C.quizScenes.length){qi=0;answers=[];} paint(); window.scrollTo(0,0);}
function scrollToTypes(){var t=document.getElementById('types'); if(t) t.scrollIntoView({behavior:'smooth'});}
(function init(){
  captureSource();                       // grab the UTM tag before anything can navigate away
  flushPending();                        // anything that never made it to the server, finish it now
  var prof=(location.search.match(/[?&]profile=([a-z]+)/)||[])[1];
  if(prof && P[prof]){ renderDemoProfile(prof); return; }
  var pm=location.pathname.match(/\/r\/([A-Za-z0-9_-]{4,})/);
  var qm=location.search.match(/[?&]r=([A-Za-z0-9_-]{4,})/);
  var id=(pm&&pm[1])||(qm&&qm[1]);
  if(!id) RESUMABLE=loadDraft();         // she may have been here before
  if(id){ stage='result';
    api('/api/result/'+id).then(function(r){return r.ok?r.json():null;}).then(function(rec){
      /* Rows saved before 14 Jul 2026 answered the two old pain questions (open1/open2). Map them
         onto the first two slots so a woman reopening her own /r/ link still sees her own words. */
      if(rec){ LOADED=rec; RESULT_ID=rec.id; var pr=rec.person||{}; person={name:pr.name||'',dream:pr.dream||pr.open1||'',become:pr.become||pr.open2||'',technique:pr.technique||'',email:pr.email||''};
        /* Restore her answers too. The tie-break reads them (her anchor pick, what she reached for
           first), so without this a woman returning to her own /r/ link could see her three bars in
           a different order than the first time. They were in the database all along — just never
           read back. */
        if(Array.isArray(rec.answers) && rec.answers.length) answers=rec.answers.slice();
      }
      paint();
    }).catch(function(){ paint(); });
  } else { paint(); }
})();
</script>
